name: Test

permissions: {}

on:
  push:
  pull_request:

jobs:
  ci-optimization:
    name: CI optimization
    uses: dargmuesli/github-actions/.github/workflows/ci-optimization.yml@5bfaf3670be589f36169fd998c5f60e8ddc9838a # 5.4.1
    permissions:
      pull-requests: read
  test:
    needs: ci-optimization
    if: needs.ci-optimization.outputs.continue == 'true'
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout git repository
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

    - name: Setup package manager
      run: corepack enable

    - name: Setup Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        cache: pnpm
        node-version: 24

    - name: Install dependencies
      run: pnpm install

    - name: Test
      run: |
        pnpm test
